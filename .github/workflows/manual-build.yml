name: Manual Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. piano-tracker-v0.3.4)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.get.outputs.release_id }}
    steps:
      - name: Get release ID for tag
        id: get
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: '${{ inputs.tag }}',
            });
            core.setOutput('release_id', String(data.id));

  build:
    needs: resolve
    uses: ./.github/workflows/build-windows.yml
    with:
      tag: ${{ inputs.tag }}
      release_id: ${{ needs.resolve.outputs.release_id }}
    secrets:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
